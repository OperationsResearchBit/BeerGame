

<!DOCTYPE html>
<html>
<head>
    <title>Beer Game: 4-Player Bullwhip Sim</title>
    <!-- External library for the waves/graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 300px; gap: 20px; max-width: 1200px; margin: auto; }
        .controls { background: #222; padding: 20px; border-radius: 8px; border: 1px solid #444; height: fit-content; }
        canvas { background: #fff; border-radius: 8px; padding: 10px; }
        .role-indicator { display: flex; justify-content: space-around; margin-bottom: 20px; max-width: 1200px; margin: 0 auto 20px auto; }
        .role-box { padding: 10px; border-radius: 4px; text-align: center; width: 22%; font-weight: bold; font-size: 0.9em; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #333; color: white; border: 1px solid #555; border-radius: 4px; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; }
        button:hover { background: #219150; }
        .stat { margin: 10px 0; font-size: 1.1em; }
        hr { border: 0; border-top: 1px solid #444; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="role-indicator">
        <div class="role-box" style="background:#e74c3c">Factory</div>
        <div class="role-box" style="background:#f1c40f; color:black">Distributor</div>
        <div class="role-box" style="background:#3498db">Wholesaler (YOU)</div>
        <div class="role-box" style="background:#2ecc71">Retailer</div>
    </div>

    <div class="grid">
        <div style="position: relative; height:450px;">
            <canvas id="inventoryChart"></canvas>
        </div>
        
        <div class="controls">
            <h3>Week: <span id="weekNum">1</span></h3>
            <div class="stat">📦 Inventory: <b id="whInv">12</b></div>
            <div class="stat">⚠️ Backlog: <b id="whBack">0</b></div>
            <hr>
            <label>Order from Distributor:</label>
            <input type="number" id="orderVal" value="4" min="0">
            <button onclick="playTurn()">Submit Week</button>
            <p style="font-size: 0.8em; color: #888; margin-top: 15px;">
                Tip: Demand jumps at Week 5. Don't panic!
            </p>
        </div>
    </div>

<script>
    let week = 1;
    // Each role starts with a 2-week lead time queue [Week 1 arrival, Week 2 arrival]
    let roles = {
        factory:     { inv: 12, back: 0, queue: [4, 4] },
        distributor: { inv: 12, back: 0, queue: [4, 4] },
        wholesaler:  { inv: 12, back: 0, queue: [4, 4] },
        retailer:    { inv: 12, back: 0, queue: [4, 4] }
    };

    const ctx = document.getElementById('inventoryChart').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [1],
            datasets: [
                { label: 'Factory', borderColor: '#e74c3c', data: [12], tension: 0.1 },
                { label: 'Distributor', borderColor: '#f1c40f', data: [12], tension: 0.1 },
                { label: 'Wholesaler', borderColor: '#3498db', data: [12], tension: 0.1 },
                { label: 'Retailer', borderColor: '#2ecc71', data: [12], tension: 0.1 }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { y: { title: { display: true, text: 'Net Inventory (Inv - Backlog)', color: '#fff' }, grid: { color: '#333' } } }
        }
    });

    function playTurn() {
        const pOrder = parseInt(document.getElementById('orderVal').value) || 0;
        const demand = week >= 5 ? 8 : 4; // Consumer demand shift

        // Update all roles simultaneously to simulate the chain
        updateRole(roles.retailer, demand, 4);
        updateRole(roles.wholesaler, 4, pOrder); 
        updateRole(roles.distributor, pOrder, 4);
        updateRole(roles.factory, 4, 4);

        week++;
        
        // Update Graph
        chart.data.labels.push(week);
        chart.data.datasets[0].data.push(roles.factory.inv - roles.factory.back);
        chart.data.datasets[1].data.push(roles.distributor.inv - roles.distributor.back);
        chart.data.datasets[2].data.push(roles.wholesaler.inv - roles.wholesaler.back);
        chart.data.datasets[3].data.push(roles.retailer.inv - roles.retailer.back);
        chart.update();

        // Update Text
        document.getElementById('weekNum').innerText = week;
        document.getElementById('whInv').innerText = roles.wholesaler.inv;
        document.getElementById('whBack').innerText = roles.wholesaler.back;
    }

    function updateRole(role, incomingOrder, outgoingOrder) {
        // 1. Receive incoming goods from 2 weeks ago
        role.inv += role.queue.shift();
        
        // 2. Try to fill orders + backlog
        let totalNeeded = incomingOrder + role.back;
        let shipped = Math.min(role.inv, totalNeeded);
        role.inv -= shipped;
        role.back = totalNeeded - shipped;
        
        // 3. Place new order (arrives in 2 weeks)
        role.queue.push(outgoingOrder);
    }
</script>
</body>
</html>
