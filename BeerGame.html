

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Beer Game: Go IO</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; 
            background: #2c3e50; color: white; font-family: sans-serif; padding: 20px; margin: 0;
        }
        .grid { 
            display: grid; grid-template-columns: 1fr 300px; gap: 20px; 
            width: 1000px; margin: 20px auto; 
        }
        /* Match your Go Board colors */
        #board-area {
            background: #deb887; border: 5px solid #8b4513; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 5px;
            position: relative; height: 400px; overflow: hidden;
        }
        canvas { display: block; }
        .controls { 
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; 
            border: 2px solid #8b4513; height: fit-content;
        }
        button { 
            padding: 15px; font-size: 16px; cursor: pointer; 
            background: #e67e22; border: none; color: white; 
            border-radius: 5px; width: 100%; font-weight: bold; margin-top: 10px;
        }
        button:hover { background: #d35400; }
        .role-indicator { display: flex; justify-content: space-around; width: 1000px; }
        .stone { 
            width: 60px; height: 60px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border: 2px solid #333; box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }
        .black { background: #000; color: white; }
        .white { background: #fff; color: #000; }
        input { 
            width: 100%; box-sizing: border-box; padding: 12px; margin: 10px 0; 
            border-radius: 5px; border: 1px solid #8b4513; font-size: 18px;
        }
        #status { font-size: 1.2rem; margin-bottom: 10px; color: #e67e22; font-weight: bold; }
        .legend { font-size: 12px; color: #000; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="role-indicator">
        <div class="stone black">Fact.</div>
        <div class="stone white">Dist.</div>
        <div class="stone black" style="border: 3px solid #e67e22;">YOU</div>
        <div class="stone white">Retail</div>
    </div>

    <div class="grid">
        <div id="board-area">
            <div class="legend">In-Transit Waves (Stones vs Time)</div>
            <canvas id="graphCanvas" width="670" height="350"></canvas>
        </div>
        
        <div class="controls">
            <div id="status">Week: <span id="weekNum">1</span></div>
            <div style="margin-bottom: 5px;">Inventory: <b id="whInv">12</b></div>
            <div style="margin-bottom: 15px;">Backlog: <b id="whBack">0</b></div>
            <hr style="border: 0; border-top: 1px solid #8b4513; margin: 15px 0;">
            <label>Order Stones:</label>
            <input type="number" id="orderVal" value="4" min="0">
            <button onclick="playTurn()">Place Stones</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    
    let week = 1;
    let history = []; // Stores [factoryInv, distInv, whInv, retInv]
    
    let roles = {
        factory: { inv: 12, back: 0, queue: [4, 4] },
        distributor: { inv: 12, back: 0, queue: [4, 4] },
        wholesaler: { inv: 12, back: 0, queue: [4, 4] },
        retailer: { inv: 12, back: 0, queue: [4, 4] }
    };

    function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Grid Lines (Go style)
        ctx.strokeStyle = "rgba(139, 69, 19, 0.2)";
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=40) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        if (history.length < 2) return;

        const colors = ['#000', '#fff', '#e67e22', '#555']; // Factory, Dist, WH, Retail
        const padding = 50;
        const xStep = (canvas.width - padding) / 20;

        colors.forEach((color, roleIdx) => {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = (roleIdx === 2) ? 4 : 2; // Make player line thicker
            
            history.forEach((data, i) => {
                let x = i * xStep + 10;
                let y = canvas.height / 2 - (data[roleIdx] * 5); // Scale and center
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.stroke();
        });
    }

    function playTurn() {
        const pOrder = parseInt(document.getElementById('orderVal').value) || 0;
        const demand = week >= 5 ? 8 : 4; // The demand shock

        // Save current net inventory to history before updating
        history.push([
            roles.factory.inv - roles.factory.back,
            roles.distributor.inv - roles.distributor.back,
            roles.wholesaler.inv - roles.wholesaler.back,
            roles.retailer.inv - roles.retailer.back
        ]);

        // Logic update
        updateRole(roles.retailer, demand, 4);
        updateRole(roles.wholesaler, 4, pOrder); 
        updateRole(roles.distributor, pOrder, 4);
        updateRole(roles.factory, 4, 4);

        week++;
        document.getElementById('weekNum').innerText = week;
        document.getElementById('whInv').innerText = roles.wholesaler.inv;
        document.getElementById('whBack').innerText = roles.wholesaler.back;
        
        drawGraph();
    }

    function updateRole(role, incomingOrder, outgoingOrder) {
        role.inv += role.queue.shift();
        let totalNeeded = incomingOrder + role.back;
        let shipped = Math.min(role.inv, totalNeeded);
        role.inv -= shipped;
        role.back = totalNeeded - shipped;
        role.queue.push(outgoingOrder);
    }

    // Initialize first data point
    playTurn(); 
</script>
</body>
</html>
